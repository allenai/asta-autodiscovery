name: Build AutoDiscovery Image

on:
  push:
    branches:
      - main
      - env/prod
    paths:
      - 'packages/autodiscovery/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/autodiscovery-build.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'packages/autodiscovery/**'
      - 'pyproject.toml'
      - 'uv.lock'
  workflow_dispatch:  # Allow manual trigger

env:
  IMAGE_NAME: us-west1-docker.pkg.dev/example-legacy-project/autodiscovery/autodiscovery

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Artifact Registry
        run: |
          echo '${{ secrets.GCP_SA_KEY }}' | docker login -u _json_key --password-stdin https://us-west1-docker.pkg.dev

      - name: Determine environment tag
        id: env-tag
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/env/prod" ]]; then
            echo "env=prod" >> $GITHUB_OUTPUT
          else
            echo "env=dev" >> $GITHUB_OUTPUT
          fi

      - name: Build image
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" > .github_token.tmp
          docker build \
            --platform linux/amd64 \
            --secret id=github_token,src=.github_token.tmp \
            -t ${{ env.IMAGE_NAME }}:${{ steps.env-tag.outputs.env }}-${{ github.sha }} \
            -t ${{ env.IMAGE_NAME }}:${{ steps.env-tag.outputs.env }} \
            -f packages/autodiscovery/Dockerfile \
            .
          rm -f .github_token.tmp

      - name: Push image
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/env/prod')
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ steps.env-tag.outputs.env }}-${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:${{ steps.env-tag.outputs.env }}

      - name: Authenticate to Google Cloud
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/env/prod')
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/env/prod')
        uses: google-github-actions/setup-gcloud@v2

      - name: Update Cloud Run Job
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/env/prod')
        run: |
          ENV_SUFFIX=${{ steps.env-tag.outputs.env }}

          echo "Updating Cloud Run Job with :${ENV_SUFFIX} image..."

          gcloud run jobs update autodiscovery-job-${ENV_SUFFIX} \
            --image ${{ env.IMAGE_NAME }}:${ENV_SUFFIX} \
            --region us-west1

          echo "✅ Job updated successfully"
