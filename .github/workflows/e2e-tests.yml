name: "E2E Tests"

on:
  check_run:
    types: [completed]
  workflow_dispatch:
    inputs:
      base_url:
        description: "Target environment URL"
        required: false
        default: "https://autodiscovery-dev.example.com"
        type: string

jobs:
  e2e:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.check_run.name == 'adhoc-asta-autodiscovery-deploy-dev (example-shared-project)' &&
       github.event.check_run.conclusion == 'success')
    runs-on: ubuntu-latest
    permissions:
      statuses: write

    defaults:
      run:
        working-directory: ui

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "yarn"
          cache-dependency-path: ui/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright browsers
        run: yarn playwright install --with-deps chromium

      - name: Run E2E tests
        run: yarn test:e2e
        env:
          E2E_BASE_URL: ${{ inputs.base_url || 'https://autodiscovery-dev.example.com' }}
          E2E_TEST_USER: ${{ secrets.E2E_TEST_USER }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ui/playwright-report/
          retention-days: 14

      - name: Report commit status
        if: always() && github.event_name == 'check_run'
        run: |
          case "${{ job.status }}" in
            success) state="success" ;;
            *) state="failure" ;;
          esac
          gh api repos/${{ github.repository }}/statuses/${{ github.event.check_run.head_sha }} \
            -f state="$state" \
            -f context="E2E Tests" \
            -f description="Playwright e2e suite" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Notify Slack on failure
        if: failure() && github.event_name == 'check_run'
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "🚨 E2E Tests failed on main\nAuthor: ${{ github.actor }}\nWorkflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
