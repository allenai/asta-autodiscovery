name: Build and Push Maintenance Image

on:
  push:
    branches:
      - main
      - jason/data-expire  # temporary for testing
    paths:
      - 'scripts/**'
      - 'packages/autodiscovery_jobs/**'
      - '.github/workflows/maintenance-build.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'scripts/**'
      - 'packages/autodiscovery_jobs/**'
  workflow_dispatch:  # Allow manual trigger

env:
  IMAGE_NAME: gcr.io/example-legacy-project/autodiscovery/maintenance

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to GCR
        run: |
          echo '${{ secrets.GCP_SA_KEY }}' | docker login -u _json_key --password-stdin gcr.io

      - name: Build image
        run: |
          docker build \
            --platform linux/amd64 \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            -f scripts/Dockerfile \
            .

      - name: Push image
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/jason/data-expire')  # temporary for testing
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest
