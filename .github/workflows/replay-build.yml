name: Build and Push Replay Image

on:
  push:
    branches:
      - main
    paths:
      - 'packages/devtools/**'
      - '.github/workflows/replay-build.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'packages/devtools/**'
  workflow_dispatch:  # Allow manual trigger

env:
  IMAGE_NAME: gcr.io/example-legacy-project/autodiscovery-replay

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to GCR
        run: |
          echo '${{ secrets.GCP_SA_KEY }}' | docker login -u _json_key --password-stdin gcr.io

      - name: Build image
        run: |
          docker build \
            --platform linux/amd64 \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            -f packages/devtools/Dockerfile \
            .

      - name: Push image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest
