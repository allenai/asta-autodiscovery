name: Build Scripts Image

on:
  push:
    branches:
      - main
      - env/prod
    paths:
      - 'scripts/**'
      - 'packages/autodiscovery_jobs/**'
      - '.github/workflows/scripts-build.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'scripts/**'
      - 'packages/autodiscovery_jobs/**'
  workflow_dispatch:  # Allow manual trigger

env:
  IMAGE_NAME: us-west1-docker.pkg.dev/example-legacy-project/autodiscovery/autodiscovery-scripts

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Artifact Registry
        run: |
          echo '${{ secrets.GCP_SA_KEY }}' | docker login -u _json_key --password-stdin https://us-west1-docker.pkg.dev

      - name: Determine environment tag
        id: env-tag
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/env/prod" ]]; then
            echo "env=prod" >> $GITHUB_OUTPUT
          else
            echo "env=dev" >> $GITHUB_OUTPUT
          fi

      - name: Build and push image
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/env/prod')
        run: |
          # Use Makefile targets for build and push
          IMAGE_TAG=${{ steps.env-tag.outputs.env }} make push-scripts-image

          # Also tag and push with commit SHA for traceability
          docker tag ${{ env.IMAGE_NAME }}:${{ steps.env-tag.outputs.env }} \
            ${{ env.IMAGE_NAME }}:${{ steps.env-tag.outputs.env }}-${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:${{ steps.env-tag.outputs.env }}-${{ github.sha }}

      - name: Build image (PR only)
        if: github.event_name == 'pull_request'
        run: |
          IMAGE_TAG=${{ steps.env-tag.outputs.env }} make build-scripts-image

      - name: Authenticate to Google Cloud
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/env/prod')
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/env/prod')
        uses: google-github-actions/setup-gcloud@v2

      - name: Update Cloud Run Jobs
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/env/prod')
        run: |
          # Use Makefile target for job updates
          IMAGE_TAG=${{ steps.env-tag.outputs.env }} make update-scripts-jobs
