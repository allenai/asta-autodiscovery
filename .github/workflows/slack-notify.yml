name: Slack Notification

on:
  workflow_run:
    workflows:
      - "Docker Compose Build"
      - "Build and Push Maintenance Image"
      - "UI Build"
    types:
      - completed
    branches:
      - main
      - jason/data-expire  # temporary for testing

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Check all workflow statuses
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.workflow_run.head_sha;
            const workflows = [
              'Docker Compose Build',
              'Build and Push Maintenance Image',
              'UI Build'
            ];

            // Get all check runs for this commit
            const { data: checkRuns } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: sha,
            });

            // Find the latest run for each workflow
            const workflowStatuses = {};
            const pending = [];
            const failed = [];

            for (const name of workflows) {
              const runs = checkRuns.check_runs.filter(r => r.name === 'build' || r.name === 'build-and-push');
              // We need to check workflow runs instead
            }

            // Get workflow runs for this SHA
            const { data: workflowRuns } = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head_sha: sha,
            });

            for (const name of workflows) {
              const run = workflowRuns.workflow_runs.find(r => r.name === name);
              if (!run) {
                pending.push(name);
              } else if (run.status !== 'completed') {
                pending.push(name);
              } else if (run.conclusion === 'failure') {
                failed.push({ name, url: run.html_url });
              }
              workflowStatuses[name] = run ? { status: run.status, conclusion: run.conclusion } : null;
            }

            console.log('Workflow statuses:', JSON.stringify(workflowStatuses, null, 2));
            console.log('Pending:', pending);
            console.log('Failed:', failed);

            // If any workflows are still pending, don't notify yet
            if (pending.length > 0) {
              console.log('Some workflows still pending, skipping notification');
              core.setOutput('should_notify', 'false');
              return;
            }

            // All workflows complete - check for failures
            if (failed.length === 0) {
              console.log('All workflows passed!');
              core.setOutput('should_notify', 'false');
              return;
            }

            // Build failure message
            const failureList = failed.map(f => `• ${f.name}: ${f.url}`).join('\n');
            const message = `🚨 ${failed.length} workflow(s) failed on ${context.payload.workflow_run.head_branch}\n\n${failureList}`;

            core.setOutput('should_notify', 'true');
            core.setOutput('message', message);

      - name: Notify Slack
        if: steps.check.outputs.should_notify == 'true'
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "${{ steps.check.outputs.message }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
