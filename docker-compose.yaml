version: "3"
services:
  sonar:
    build: ./sonar
    depends_on:
      - api
      - ui
      - proxy
  api:
    build:
      context: .
      dockerfile: ./api/Dockerfile
    # The image ENTRYPOINT defaults to the production script (start.sh) for
    # Skiff2/Cloud Run, which cannot override the container command.
    # Local dev uses dev.sh for hot reload (--reload).
    entrypoint: ["/api/dev.sh"]
    env_file:
      - .env
    volumes:
      - ./api:/api
      - type: bind
        source: ${GOOGLE_APPLICATION_CREDENTIALS}
        target: /secrets/gcp-key.json
        read_only: true
        bind:
          create_host_path: false
      # For AUTH_PROVIDER=password_file, mount the store and point AUTH_PASSWORD_FILE at it:
      # - type: bind
      #   source: ./secrets/users.json
      #   target: /secrets/users.json
      #   read_only: true
    environment:
      # This ensures that errors are printed as they occur, which
      # makes debugging easier.
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      # Active auth provider: auth0 (default) | password_file | none
      - AUTH_PROVIDER=${AUTH_PROVIDER:-auth0}
      - AUTH0_DOMAIN=${AUTH0_DOMAIN:-auth0.allenai.org}
      - AUTH0_AUDIENCE=${AUTH0_AUDIENCE:-https://asta-core.allen.ai}
      # Served to the UI via /api/auth/config so the SPA client can be built at runtime.
      - AUTH0_CLIENT_ID=${AUTH0_CLIENT_ID}
      # If set, users must have this permission. If empty/unset, any authenticated user can access.
      - AUTH_REQUIRED_PERMISSION=${AUTH_REQUIRED_PERMISSION:-${AUTH0_REQUIRED_PERMISSION}}
      # password_file provider: path to the mounted store + HS256 session signing secret.
      - AUTH_PASSWORD_FILE=${AUTH_PASSWORD_FILE}
      - AUTH_SESSION_SECRET=${AUTH_SESSION_SECRET}
      - AUTH_SESSION_TTL=${AUTH_SESSION_TTL}
      # GCS and Google Cloud credentials
      - GCS_BUCKET=${GCS_BUCKET}
      - GCP_PROJECT=${GCP_PROJECT}
      - GOOGLE_ACCESS_KEY_ID=${GOOGLE_ACCESS_KEY_ID}
      - GOOGLE_ACCESS_KEY_SECRET=${GOOGLE_ACCESS_KEY_SECRET}
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/gcp-key.json
      # Cloud Run job name for local dev (use -dev suffix)
      - CLOUDRUN_JOB_NAME=${CLOUDRUN_JOB_NAME:-autodiscovery-job-dev}
      # Asta context service (artifact storage + metadata)
      - ASTA_CONTEXT_SERVICE_URL=${ASTA_CONTEXT_SERVICE_URL}
      - ASTA_CONTEXT_SERVICE_API_KEY=${ASTA_CONTEXT_SERVICE_API_KEY}
  ui:
    build:
      context: ./ui
      dockerfile: dev.Dockerfile
    volumes:
      - ./ui/src:/ui/src
      - ./ui/public:/ui/public
    environment:
      - NODE_ENV=development
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3000"]
      interval: 3s
      timeout: 5s
      retries: 10
  proxy:
    build: ./proxy
    ports:
      - "8080:8080"
    depends_on:
      ui:
        condition: service_healthy
      api:
        condition: service_started
