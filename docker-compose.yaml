version: "3"
services:
  sonar:
    build: ./sonar
    depends_on:
      - api
      - ui
      - proxy
  api:
    build:
      context: .
      dockerfile: ./api/Dockerfile
    # The image ENTRYPOINT defaults to the production script (start.sh) for
    # Skiff2/Cloud Run, which cannot override the container command.
    # Local dev uses dev.sh for hot reload (--reload).
    entrypoint: ["/api/dev.sh"]
    env_file:
      - .env
    volumes:
      - ./api:/api
      - type: bind
        source: ${GOOGLE_APPLICATION_CREDENTIALS}
        target: /secrets/gcp-key.json
        read_only: true
        bind:
          create_host_path: false
    environment:
      # This ensures that errors are printed as they occur, which
      # makes debugging easier.
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - AUTH0_DOMAIN=${AUTH0_DOMAIN:-auth0.allenai.org}
      - AUTH0_AUDIENCE=${AUTH0_AUDIENCE:-https://asta-core.allen.ai}
      # If set, users must have this Auth0 permission. If empty/unset, any authenticated user can access.
      - AUTH0_REQUIRED_PERMISSION=${AUTH0_REQUIRED_PERMISSION}
      # GCS and Google Cloud credentials
      - GCS_BUCKET=${GCS_BUCKET}
      - GCP_PROJECT=${GCP_PROJECT}
      - GOOGLE_ACCESS_KEY_ID=${GOOGLE_ACCESS_KEY_ID}
      - GOOGLE_ACCESS_KEY_SECRET=${GOOGLE_ACCESS_KEY_SECRET}
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/gcp-key.json
      # Cloud Run job name for local dev (use -dev suffix)
      - CLOUDRUN_JOB_NAME=${CLOUDRUN_JOB_NAME:-autodiscovery-job-dev}
  ui:
    build:
      context: ./ui
      dockerfile: dev.Dockerfile
    volumes:
      - ./ui/src:/ui/src
      - ./ui/public:/ui/public
    environment:
      - NODE_ENV=development
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3000"]
      interval: 3s
      timeout: 5s
      retries: 10
  proxy:
    build: ./proxy
    ports:
      - "8080:8080"
    depends_on:
      ui:
        condition: service_healthy
      api:
        condition: service_started
