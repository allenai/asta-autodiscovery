version: '3'
services:
  sonar:
    build: ./sonar
    depends_on:
      - api
      - ui
      - autods-viz
      - proxy
  api:
    build: ./api
    volumes:
      - ./api:/api
    environment:
      # This ensures that errors are printed as they occur, which
      # makes debugging easier.
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=DEBUG
      - AUTH0_DOMAIN=auth.example.com
      - AUTH0_AUDIENCE=https://autodiscovery.example.com
      - AUTH0_REQUIRED_PERMISSION=enroll:autodiscovery_v0
  ui:
    build:
      context: ./ui
      dockerfile: dev.Dockerfile
    volumes:
      - ./ui/src:/ui/src
      - ./ui/public:/ui/public
    environment:
      - NODE_ENV=development
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "localhost:3000"]
      interval: 3s
      timeout: 5s
      retries: 10
  autods-viz:
    build: ./autods-viz
    volumes:
      - ./autods-viz/server.js:/app/server.js
      - ./autods-viz/public:/app/public
      - ./autods-viz/results:/app/results
    environment:
      - PORT=3001
      - BASE_PATH=/autods-viz
      - NODE_ENV=development
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "localhost:3001/api/health"]
      interval: 3s
      timeout: 5s
      retries: 10
  proxy:
    build: ./proxy
    ports:
      - "8080:8080"
    depends_on:
      ui:
        condition: service_healthy
      autods-viz:
        condition: service_healthy
      api:
        condition: service_started
