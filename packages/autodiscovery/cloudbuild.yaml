steps:
  - name: 'gcr.io/cloud-builders/docker'
    secretEnv: ['GITHUB_TOKEN']
    env:
      - 'DOCKER_BUILDKIT=1'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "$$GITHUB_TOKEN" > /workspace/.github_token
        docker build --secret id=github_token,src=/workspace/.github_token \
          -f packages/autodiscovery/Dockerfile \
          -t us-west1-docker.pkg.dev/$PROJECT_ID/autodiscovery/autodiscovery:latest /workspace
        rm /workspace/.github_token

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-west1-docker.pkg.dev/$PROJECT_ID/autodiscovery/autodiscovery:latest'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/github-token-secret/versions/latest
      env: 'GITHUB_TOKEN'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
