[project]
name = "asta-autodiscovery"
version = "0.2.2"
description = "Open-ended Scientific Discovery via Bayesian Surprise"
readme = "RELEASE.md"
license = "Apache-2.0"
requires-python = ">=3.13"
dependencies = [
    "pip",
    "numpy>=2.0.0",
    "pandas>=2.2.0",
    "matplotlib==3.10",
    "IPython>=9.9.0",
    "ag2[openai, gemini]==0.10",
    "google-cloud-aiplatform",
    "scikit-learn",
    "scipy",
    "statsmodels",
    "h5py",
    "boto3",
    "tenacity>=9.1.2",
    "asta-autodiscovery-modal",
    "asta-code-execution",
]

[project.scripts]
auto-discovery = "autodiscovery.easy:cli_main"

[build-system]
requires = ["uv_build>=0.9.25,<0.10.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "autodiscovery"
