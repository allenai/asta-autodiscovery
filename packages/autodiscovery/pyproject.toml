[project]
name = "autodiscovery"
version = "0.1.0"
description = "Open-ended Scientific Discovery via Bayesian Surprise"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "pip",
    "numpy>=2.0.0",
    "pandas>=2.2.0",
    "matplotlib==3.10",
    "IPython>=9.9.0",
    "ag2[openai, gemini]==0.10",
    "google-cloud-aiplatform",
    "scikit-learn",
    "scipy",
    "statsmodels",
    "h5py",
    "boto3",
    "autodiscovery-modal",
]

[build-system]
requires = ["uv_build>=0.9.25,<0.10.0"]
build-backend = "uv_build"
